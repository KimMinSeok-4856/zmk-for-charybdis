name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest 
    steps:
      - uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules
            tools
            zephyr
            bootloader
            zmk
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-

      - name: Initialize workspace (West Init)
        uses: zmkfirmware/zmk-actions-toolkit-init@v1

      - name: Download modules (West Update)
        uses: zmkfirmware/zmk-actions-toolkit-refresh@v1

      - name: West Zephyr export
        run: west zephyr-export

      - name: Build Left Shield
        uses: zmkfirmware/zmk-actions-toolkit-build@v1
        with:
          board: nice_nano_v2
          shield: charybdis_left
          config_path: config

      - name: Build Right Shield
        uses: zmkfirmware/zmk-actions-toolkit-build@v1
        with:
          board: nice_nano_v2
          shield: charybdis_right
          config_path: config

      - name: Prepare artifacts
        run: |
          mkdir -p build/artifacts
          [ -f build/left/zephyr/zmk.uf2 ] && cp build/left/zephyr/zmk.uf2 build/artifacts/charybdis_left.uf2 || true
          [ -f build/right/zephyr/zmk.uf2 ] && cp build/right/zephyr/zmk.uf2 build/artifacts/charybdis_right.uf2 || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: charybdis-firmware
          path: build/artifacts
