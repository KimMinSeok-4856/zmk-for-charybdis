name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    strategy:
      matrix:
        shield: [charybdis_left, charybdis_right]
    steps:
      - uses: actions/checkout@v4
      
      - name: West Init
        run: west init -l config
        
      # [핵심] 다운로드 찌꺼기를 다 밀어버리고, civetweb 에러가 나도 무시하고 무한대기 없이 넘어가게 만듭니다.
      - name: West Update
        run: |
          rm -rf .west modules bootloader zephyr zmk
          west init -l config || true
          west update --help | grep -q ignore-errors && west update --ignore-errors || west update || true

      - name: West Zephyr export
        run: west zephyr-export
        
      # 유저님의 MAIN, FIFA, SETTING 최신 문법 키맵을 여기서 빌드합니다.
      - name: West Build
        run: west build -s zmk/app -b nice_nano_v2 -- -DSHIELD=${{ matrix.shield }} -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
        
      - name: Prepare artifacts
        run: |
          mkdir -p build/artifacts
          cp build/zephyr/zmk.uf2 build/artifacts/${{ matrix.shield }}.uf2
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.shield }}-firmware
          path: build/artifacts
